<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow Lite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0c0f;
      --surface:   #13131a;
      --surface2:  #1a1a24;
      --border:    #ffffff0f;
      --border2:   #ffffff18;
      --text:      #e8e8f0;
      --muted:     #6b6b80;
      --accent:    #e8ff47;
      --accent2:   #47ffb8;
      --danger:    #ff4757;
      --warn:      #ffa502;

      --todo-col:     #1e1e2e;
      --progress-col: #1a1f2e;
      --done-col:     #141e1a;

      --radius:  10px;
      --radius-lg: 16px;
      --shadow:  0 4px 24px #00000060;
      --glow:    0 0 40px #e8ff4720;
    }

    html { height: 100%; }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Noise overlay ────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ───────────────────────────────────────── */
    .app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Header ───────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      background: #0c0c0f99;
      backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 8px;
      display: grid;
      place-items: center;
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 #e8ff4740; }
      50%       { box-shadow: 0 0 0 8px #e8ff4700; }
    }

    .logo-mark svg { width: 18px; height: 18px; }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .logo-text span { color: var(--accent); }

    .header-right { display: flex; align-items: center; gap: 16px; }

    .api-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      color: var(--muted);
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-dot.online  { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
    .status-dot.offline { background: var(--danger);  box-shadow: 0 0 6px var(--danger); }

    /* ── Toolbar ──────────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 32px;
      flex-wrap: wrap;
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    input[type="text"], select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input[type="text"]:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px #e8ff4715;
    }

    .search-input {
      width: 100%;
      padding: 10px 14px 10px 40px;
    }

    .filter-select {
      padding: 10px 14px;
      cursor: pointer;
    }

    .filter-select option { background: var(--surface2); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: var(--radius);
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      font-weight: 400;
      cursor: pointer;
      border: none;
      transition: all 0.18s;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #0c0c0f;
      font-weight: 600;
    }
    .btn-primary:hover { background: #f0ff6a; transform: translateY(-1px); box-shadow: 0 4px 16px #e8ff4730; }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--border2); background: var(--surface); }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid #ff475730;
    }
    .btn-danger:hover { background: #ff475715; border-color: var(--danger); }

    .btn-sm { padding: 6px 12px; font-size: 0.72rem; }
    .btn-icon { padding: 8px; border-radius: 8px; }

    /* ── Stats bar ────────────────────────────────────── */
    .stats-bar {
      display: flex;
      gap: 1px;
      padding: 0 32px 20px;
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.18s;
    }
    .stat-pill:first-child { border-radius: var(--radius) 0 0 var(--radius); }
    .stat-pill:last-child  { border-radius: 0 var(--radius) var(--radius) 0; }
    .stat-pill.active, .stat-pill:hover { color: var(--text); background: var(--surface2); border-color: var(--border2); }
    .stat-pill.active { border-color: var(--accent); color: var(--accent); }

    .stat-count {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
    }
    .stat-pill.active .stat-count { color: var(--accent); }

    /* ── Kanban Board ─────────────────────────────────── */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 0 32px 32px;
      flex: 1;
      align-items: start;
    }

    .column {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
    }
    .column:nth-child(2) { animation-delay: 0.08s; }
    .column:nth-child(3) { animation-delay: 0.16s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .col-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .col-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .col-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    .col-todo     .col-dot { background: var(--muted); }
    .col-progress .col-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .col-done     .col-dot { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }

    .col-count {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .task-list {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 80px;
    }

    /* ── Task Card ────────────────────────────────────── */
    .task-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.18s;
      animation: cardIn 0.25s ease both;
      position: relative;
      overflow: hidden;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.97) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .task-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
      transition: opacity 0.2s;
    }

    .task-card.priority-high::before   { background: var(--danger); }
    .task-card.priority-medium::before { background: var(--warn); }
    .task-card.priority-low::before    { background: var(--muted); }

    .task-card:hover {
      border-color: var(--border2);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .task-title {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.88rem;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .task-desc {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.65rem;
      background: var(--border);
      color: var(--muted);
      border: 1px solid var(--border);
      letter-spacing: 0.03em;
    }

    .priority-badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .priority-badge.high   { background: #ff47571a; color: var(--danger); border: 1px solid #ff475730; }
    .priority-badge.medium { background: #ffa5021a; color: var(--warn);   border: 1px solid #ffa50230; }
    .priority-badge.low    { background: #6b6b801a; color: var(--muted);  border: 1px solid #6b6b8030; }

    .due-date {
      font-size: 0.65rem;
      color: var(--muted);
      margin-left: auto;
    }
    .due-date.overdue { color: var(--danger); }

    .task-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      opacity: 0;
      transition: opacity 0.18s;
    }

    .task-card:hover .task-actions { opacity: 1; }

    /* ── Empty state ──────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--muted);
    }
    .empty-state svg { opacity: 0.3; margin-bottom: 8px; }
    .empty-state p { font-size: 0.75rem; }

    /* ── Loading ──────────────────────────────────────── */
    .loading-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      animation: shimmer 1.5s ease-in-out infinite;
    }
    .loading-line {
      height: 10px;
      background: var(--border2);
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .loading-line.short { width: 60%; }

    @keyframes shimmer {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 1; }
    }

    /* ── Modal ────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: #00000090;
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s;
      padding: 20px;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 500px;
      box-shadow: 0 24px 80px #00000080;
      transform: scale(0.96) translateY(12px);
      transition: transform 0.22s;
    }
    .modal-overlay.open .modal { transform: scale(1) translateY(0); }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
    }

    .modal-body { padding: 20px 24px; }
    .modal-footer {
      padding: 16px 24px 20px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    input[type="text"],
    input[type="date"],
    textarea,
    select.form-select {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]:focus,
    input[type="date"]:focus,
    textarea:focus,
    select.form-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px #e8ff4715;
    }

    input[type="date"] { color-scheme: dark; }

    textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .form-error {
      font-size: 0.68rem;
      color: var(--danger);
      margin-top: 4px;
    }

    /* ── Toast ────────────────────────────────────────── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.75rem;
      color: var(--text);
      border: 1px solid var(--border2);
      background: var(--surface2);
      box-shadow: var(--shadow);
      animation: toastIn 0.3s ease both;
      pointer-events: all;
      max-width: 320px;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px) scale(0.96); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }

    .toast.success { border-color: #47ffb830; }
    .toast.error   { border-color: #ff475730; }
    .toast.info    { border-color: #e8ff4730; }
    .toast-icon { font-size: 1rem; }

    /* ── Scrollbar ────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── Responsive ───────────────────────────────────── */
    @media (max-width: 900px) {
      .board { grid-template-columns: 1fr; }
      header, .toolbar, .stats-bar, .board { padding-left: 16px; padding-right: 16px; }
    }

    @media (max-width: 540px) {
      .form-row { grid-template-columns: 1fr; }
      .logo-text { display: none; }
    }

    /* ── View toggle ──────────────────────────────────── */
    .view-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .view-btn {
      padding: 8px 12px;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.18s;
    }
    .view-btn.active { background: var(--surface2); color: var(--accent); }

    /* ── List view ────────────────────────────────────── */
    .list-view { padding: 0 32px 32px; display: flex; flex-direction: column; gap: 6px; }

    .list-item {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      cursor: pointer;
      transition: all 0.18s;
      animation: fadeUp 0.25s ease both;
    }
    .list-item:hover { border-color: var(--border2); background: var(--surface2); transform: translateX(2px); }

    .list-status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .list-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      flex: 1;
    }

    .list-item-meta { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-mark">
        <svg fill="none" viewBox="0 0 24 24" stroke="#0c0c0f" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
        </svg>
      </div>
      <span class="logo-text">Task<span>Flow</span> Lite</span>
    </div>
    <div class="header-right">
      <div class="api-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">connecting...</span>
      </div>
      <button class="btn btn-primary" onclick="openModal()">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        New Task
      </button>
    </div>
  </header>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Search tasks..." oninput="handleSearch()" />
    </div>

    <select class="filter-select" id="priorityFilter" onchange="loadTasks()">
      <option value="">All priorities</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>

    <select class="filter-select" id="sortFilter" onchange="loadTasks()">
      <option value="createdAt:desc">Newest first</option>
      <option value="createdAt:asc">Oldest first</option>
      <option value="dueDate:asc">Due soonest</option>
      <option value="priority:desc">Priority</option>
      <option value="title:asc">A → Z</option>
    </select>

    <div class="view-toggle">
      <button class="view-btn active" id="kanbanBtn" onclick="setView('kanban')" title="Kanban view">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="11" rx="1"/>
        </svg>
      </button>
      <button class="view-btn" id="listBtn" onclick="setView('list')" title="List view">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-pill active" id="pill-all" onclick="filterByStatus('')">
      <span class="stat-count" id="count-all">0</span>
      <span>total</span>
    </div>
    <div class="stat-pill" id="pill-todo" onclick="filterByStatus('todo')">
      <span class="stat-count" id="count-todo">0</span>
      <span>todo</span>
    </div>
    <div class="stat-pill" id="pill-progress" onclick="filterByStatus('in-progress')">
      <span class="stat-count" id="count-progress">0</span>
      <span>in progress</span>
    </div>
    <div class="stat-pill" id="pill-done" onclick="filterByStatus('done')">
      <span class="stat-count" id="count-done">0</span>
      <span>done</span>
    </div>
  </div>

  <!-- Board / List -->
  <div id="mainContent">
    <!-- Kanban Board -->
    <div class="board" id="kanbanBoard">
      <div class="column col-todo">
        <div class="col-header">
          <div class="col-title"><div class="col-dot"></div> Todo</div>
          <span class="col-count" id="col-count-todo">0</span>
        </div>
        <div class="task-list" id="list-todo"></div>
      </div>
      <div class="column col-progress">
        <div class="col-header">
          <div class="col-title"><div class="col-dot"></div> In Progress</div>
          <span class="col-count" id="col-count-progress">0</span>
        </div>
        <div class="task-list" id="list-progress"></div>
      </div>
      <div class="column col-done">
        <div class="col-header">
          <div class="col-title"><div class="col-dot"></div> Done</div>
          <span class="col-count" id="col-count-done">0</span>
        </div>
        <div class="task-list" id="list-done"></div>
      </div>
    </div>

    <!-- List View (hidden by default) -->
    <div class="list-view" id="listView" style="display:none"></div>
  </div>

</div>

<!-- Task Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">New Task</div>
      <button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="fTitle" placeholder="What needs to be done?" maxlength="200" />
        <div class="form-error" id="err-title"></div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="fDesc" placeholder="Add more details..." maxlength="2000"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Status</label>
          <select class="form-select" id="fStatus">
            <option value="todo">Todo</option>
            <option value="in-progress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div class="form-group">
          <label>Priority</label>
          <select class="form-select" id="fPriority">
            <option value="medium">Medium</option>
            <option value="high">High</option>
            <option value="low">Low</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Due Date</label>
          <input type="date" id="fDueDate" />
        </div>
        <div class="form-group">
          <label>Tags (comma-separated)</label>
          <input type="text" id="fTags" placeholder="frontend, bug, api" />
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger btn-sm" id="deleteBtn" onclick="deleteCurrentTask()" style="display:none; margin-right:auto;">
        <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
        Delete
      </button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveTask()">Create Task</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
  // ── Config ──────────────────────────────────────────────
  const API = 'http://localhost:3000/api';

  // ── State ───────────────────────────────────────────────
  let allTasks = [];
  let currentView = 'kanban';
  let currentStatusFilter = '';
  let editingId = null;
  let searchTimeout = null;

  // ── API Helper ──────────────────────────────────────────
  async function apiFetch(method, path, body = null) {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json' },
      ...(body ? { body: JSON.stringify(body) } : {})
    };
    const res = await fetch(`${API}${path}`, opts);
    if (res.status === 204) return { success: true };
    return res.json();
  }

  // ── Health Check ────────────────────────────────────────
  async function checkHealth() {
    const dot  = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    try {
      const r = await apiFetch('GET', '/health');
      if (r.success) {
        dot.className  = 'status-dot online';
        text.textContent = 'API online';
      } else throw new Error();
    } catch {
      dot.className  = 'status-dot offline';
      text.textContent = 'API offline';
    }
  }

  // ── Load Tasks ──────────────────────────────────────────
  async function loadTasks() {
    showLoading();
    try {
      const params = buildParams();
      const r = await apiFetch('GET', `/tasks${params}`);
      if (!r.success) throw new Error(r.error?.message);
      allTasks = r.data;
      renderAll();
      updateStats();
    } catch (err) {
      toast('Could not load tasks — is the API server running?', 'error');
      showOfflineState();
    }
  }

  function buildParams() {
    const search   = document.getElementById('searchInput').value.trim();
    const priority = document.getElementById('priorityFilter').value;
    const [sortBy, order] = document.getElementById('sortFilter').value.split(':');
    const p = new URLSearchParams();
    if (search)            p.set('search', search);
    if (priority)          p.set('priority', priority);
    if (currentStatusFilter) p.set('status', currentStatusFilter);
    if (sortBy)            p.set('sortBy', sortBy);
    if (order)             p.set('order', order);
    return p.toString() ? '?' + p.toString() : '';
  }

  // ── Render ──────────────────────────────────────────────
  function renderAll() {
    if (currentView === 'kanban') renderKanban();
    else renderList();
  }

  function renderKanban() {
    const groups = { todo: [], 'in-progress': [], done: [] };
    allTasks.forEach(t => (groups[t.status] || groups.todo).push(t));

    document.getElementById('list-todo').innerHTML     = renderCards(groups.todo);
    document.getElementById('list-progress').innerHTML = renderCards(groups['in-progress']);
    document.getElementById('list-done').innerHTML     = renderCards(groups.done);

    document.getElementById('col-count-todo').textContent     = groups.todo.length;
    document.getElementById('col-count-progress').textContent = groups['in-progress'].length;
    document.getElementById('col-count-done').textContent     = groups.done.length;
  }

  function renderCards(tasks) {
    if (!tasks.length) return `
      <div class="empty-state">
        <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        <p>No tasks here</p>
      </div>`;
    return tasks.map(cardHTML).join('');
  }

  function cardHTML(t) {
    const tags   = (t.tags || []).map(tag => `<span class="tag">${esc(tag)}</span>`).join('');
    const due    = t.dueDate ? dueDateHTML(t.dueDate) : '';
    const status = t.status === 'todo' ? 'todo' : t.status === 'in-progress' ? 'in-progress' : 'done';
    return `
      <div class="task-card priority-${t.priority}" onclick="openModal('${t.id}')">
        <div class="task-title">${esc(t.title)}</div>
        ${t.description ? `<div class="task-desc">${esc(t.description)}</div>` : ''}
        <div class="task-meta">
          <span class="priority-badge ${t.priority}">${t.priority}</span>
          ${tags}
          ${due}
        </div>
        <div class="task-actions">
          ${status !== 'done' ? `
          <button class="btn btn-ghost btn-sm" onclick="quickAdvance(event,'${t.id}','${status}')">
            ${status === 'todo' ? '▶ Start' : '✓ Done'}
          </button>` : ''}
          <button class="btn btn-ghost btn-sm" onclick="openModal('${t.id}'); event.stopPropagation()">Edit</button>
        </div>
      </div>`;
  }

  function renderList() {
    const lv = document.getElementById('listView');
    if (!allTasks.length) {
      lv.innerHTML = `<div class="empty-state" style="padding:48px"><svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><p>No tasks found</p></div>`;
      return;
    }
    lv.innerHTML = allTasks.map(t => {
      const dotColor = t.status === 'done' ? 'var(--accent2)' : t.status === 'in-progress' ? 'var(--accent)' : 'var(--muted)';
      return `
        <div class="list-item" onclick="openModal('${t.id}')">
          <div class="list-status-dot" style="background:${dotColor}"></div>
          <div class="list-title">${esc(t.title)}</div>
          <div class="list-item-meta">
            <span class="priority-badge ${t.priority}">${t.priority}</span>
            ${t.dueDate ? dueDateHTML(t.dueDate) : ''}
          </div>
        </div>`;
    }).join('');
  }

  function dueDateHTML(dateStr) {
    const d = new Date(dateStr);
    const now = new Date();
    const overdue = d < now && dateStr;
    const label = d.toLocaleDateString('en', { month: 'short', day: 'numeric' });
    return `<span class="due-date ${overdue ? 'overdue' : ''}">📅 ${label}</span>`;
  }

  // ── Stats ───────────────────────────────────────────────
  async function updateStats() {
    try {
      const r = await apiFetch('GET', '/tasks/stats');
      if (!r.success) return;
      const s = r.data;
      document.getElementById('count-all').textContent      = s.total;
      document.getElementById('count-todo').textContent     = s.byStatus.todo;
      document.getElementById('count-progress').textContent = s.byStatus['in-progress'];
      document.getElementById('count-done').textContent     = s.byStatus.done;
    } catch {}
  }

  function filterByStatus(status) {
    currentStatusFilter = status;
    document.querySelectorAll('.stat-pill').forEach(p => p.classList.remove('active'));
    const map = { '': 'all', 'todo': 'todo', 'in-progress': 'progress', 'done': 'done' };
    document.getElementById(`pill-${map[status]}`).classList.add('active');
    loadTasks();
  }

  // ── Search (debounced) ──────────────────────────────────
  function handleSearch() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(loadTasks, 350);
  }

  // ── View ────────────────────────────────────────────────
  function setView(v) {
    currentView = v;
    document.getElementById('kanbanBoard').style.display = v === 'kanban' ? '' : 'none';
    document.getElementById('listView').style.display    = v === 'list'   ? '' : 'none';
    document.getElementById('kanbanBtn').classList.toggle('active', v === 'kanban');
    document.getElementById('listBtn').classList.toggle('active', v === 'list');
    renderAll();
  }

  // ── Quick status advance ────────────────────────────────
  async function quickAdvance(e, id, status) {
    e.stopPropagation();
    const next = status === 'todo' ? 'in-progress' : 'done';
    try {
      const r = await apiFetch('PATCH', `/tasks/${id}`, { status: next });
      if (r.success) { toast(`Task moved to ${next}`, 'success'); loadTasks(); }
    } catch { toast('Update failed', 'error'); }
  }

  // ── Modal ───────────────────────────────────────────────
  function openModal(id = null) {
    editingId = id;
    clearErrors();
    document.getElementById('deleteBtn').style.display = id ? '' : 'none';
    document.getElementById('saveBtn').textContent     = id ? 'Save Changes' : 'Create Task';
    document.getElementById('modalTitle').textContent  = id ? 'Edit Task' : 'New Task';

    if (id) {
      const t = allTasks.find(t => t.id === id);
      if (!t) return;
      document.getElementById('fTitle').value    = t.title;
      document.getElementById('fDesc').value     = t.description || '';
      document.getElementById('fStatus').value   = t.status;
      document.getElementById('fPriority').value = t.priority;
      document.getElementById('fDueDate').value  = t.dueDate || '';
      document.getElementById('fTags').value     = (t.tags || []).join(', ');
    } else {
      document.getElementById('fTitle').value    = '';
      document.getElementById('fDesc').value     = '';
      document.getElementById('fStatus').value   = 'todo';
      document.getElementById('fPriority').value = 'medium';
      document.getElementById('fDueDate').value  = '';
      document.getElementById('fTags').value     = '';
    }

    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('fTitle').focus(), 100);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    editingId = null;
    clearErrors();
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  // ── Save task ───────────────────────────────────────────
  async function saveTask() {
    clearErrors();
    const title = document.getElementById('fTitle').value.trim();
    if (!title) { showError('err-title', 'Title is required'); return; }

    const tagsRaw = document.getElementById('fTags').value;
    const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

    const payload = {
      title,
      description: document.getElementById('fDesc').value.trim(),
      status:   document.getElementById('fStatus').value,
      priority: document.getElementById('fPriority').value,
      dueDate:  document.getElementById('fDueDate').value || null,
      tags
    };

    const btn = document.getElementById('saveBtn');
    btn.textContent = 'Saving...';
    btn.disabled = true;

    try {
      const r = editingId
        ? await apiFetch('PATCH', `/tasks/${editingId}`, payload)
        : await apiFetch('POST',  '/tasks', payload);

      if (r.success) {
        closeModal();
        toast(editingId ? 'Task updated!' : 'Task created!', 'success');
        loadTasks();
      } else {
        (r.error?.details || []).forEach(d => {
          if (d.field === 'title') showError('err-title', d.message);
        });
        if (!r.error?.details?.length) toast(r.error?.message || 'Error saving task', 'error');
      }
    } catch { toast('Network error — is the API running?', 'error'); }

    btn.textContent = editingId ? 'Save Changes' : 'Create Task';
    btn.disabled = false;
  }

  // ── Delete task ─────────────────────────────────────────
  async function deleteCurrentTask() {
    if (!editingId || !confirm('Delete this task? This cannot be undone.')) return;
    try {
      const r = await apiFetch('DELETE', `/tasks/${editingId}`);
      if (r.success) { closeModal(); toast('Task deleted', 'info'); loadTasks(); }
    } catch { toast('Delete failed', 'error'); }
  }

  // ── Helpers ─────────────────────────────────────────────
  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showError(id, msg) { document.getElementById(id).textContent = msg; }
  function clearErrors() { document.querySelectorAll('.form-error').forEach(e => e.textContent = ''); }

  function showLoading() {
    const skeleton = `
      <div class="loading-card"><div class="loading-line"></div><div class="loading-line short"></div></div>
      <div class="loading-card"><div class="loading-line"></div><div class="loading-line short"></div></div>`;
    ['todo','progress','done'].forEach(s => {
      const el = document.getElementById(`list-${s}`);
      if (el) el.innerHTML = skeleton;
    });
  }

  function showOfflineState() {
    ['todo','progress','done'].forEach(s => {
      const el = document.getElementById(`list-${s}`);
      if (el) el.innerHTML = `<div class="empty-state"><p>⚡ API offline</p></div>`;
    });
  }

  function toast(msg, type = 'info') {
    const icons = { success: '✓', error: '✗', info: '→' };
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<span class="toast-icon">${icons[type]}</span><span>${esc(msg)}</span>`;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  // ── Keyboard shortcuts ──────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openModal(); }
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      if (document.getElementById('modalOverlay').classList.contains('open')) saveTask();
    }
  });

  // ── Boot ────────────────────────────────────────────────
  checkHealth();
  loadTasks();
  setInterval(checkHealth, 30000);
</script>
</body>
</html>
